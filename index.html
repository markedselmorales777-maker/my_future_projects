<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ventus Learning Hub - Login</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="login-body">

    <div class="auth-container">
        <div class="login-card">
            <div class="logo">Ventus Learning Hub</div>
            <h2>Welcome Back!</h2>
            <p>Please sign in to access your computer science workspace.</p>
            <form action="home.html" method="GET">
                <div class="input-group">
                    <label>Username or Email</label>
                    <input type="text" id="username" value="mark_edsel" placeholder="Enter username..." required autocomplete="off">
                </div>
                <div class="input-group">
                    <label>Password</label>
                    <input type="password" id="password" value="••••••••" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn-login">Sign In</button>
            </form>
        </div>
    </div>

</body>
</html>
