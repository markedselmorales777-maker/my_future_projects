<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ventus Learning Hub - Activities</title>
    <link rel="stylesheet" href="style.css">
    
    <!-- External Engines para sa isolated coding workspace -->
    <script src="https://cdn.jsdelivr.net/pyodide/v0.26.1/full/pyodide.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.45.0/min/vs/loader.min.js"></script>
</head>
<body class="workspace-body">

    <!-- Workspace Header Area -->
    <header class="workspace-header">
        <button class="back-btn" onclick="window.location.href='course.html'">← Back to Course</button>
        <div class="quest-dots" id="quest-nav"></div>
        <div id="runtime-status">🔄 Loading Environments...</div>
        
        <div class="header-right-workspace">
            <span class="workspace-user">Mark Edsel Morales</span>
            <a href="index.html" class="logout-btn-mini">Logout</a>
        </div>
    </header>

    <div class="workspace" id="workspace-container">
        
        <!-- LEFT PANEL: Monaco Code Editor Workspace -->
        <div class="left-panel" id="left-panel">
            <div class="panel-header-code">
                <span>main.py</span>
            </div>
            <div id="editor-container"></div>
        </div>

        <!-- SPLIT DRAG RESIZER -->
        <div class="resizer" id="workspace-resizer"></div>

        <!-- RIGHT PANEL CONTAINER HOLDING BOTH LAYERS -->
        <div class="right-panel-area" id="right-panel-area">
            
            <!-- LAYER 1 (ILALIM): Terminal Output View -->
            <div class="output-panel-under">
                <div class="action-toolbar">
                    <button class="action-btn" id="run-code-btn" onclick="evaluateTaskCode()" title="Run Code" disabled>▶ Run</button>
                    <span style="font-size: 13px; font-weight: 600; color:#fff;">Console Output View</span>
                </div>
                
                <!-- Terminal Screen Sandbox Container -->
                <div class="console-sandbox" id="terminal-screen" onclick="focusTerminalInput()">
                    <span id="terminal-log">Run your code to see console output logs here...<br></span>
                    <span id="terminal-input-container" style="display: none; align-items: center; width: 100%; margin-top: 5px;">
                        <span id="terminal-prompt" style="color: #a6e3a1; font-weight: bold; white-space: pre-wrap;"></span>
                        <input type="text" id="terminal-input-field" style="flex: 1; border: none; background: transparent; color: #fff; font-family: 'Courier New', monospace; font-size: 14px; outline: none;" onkeydown="handleTerminalSubmit(event)" autocomplete="off">
                    </span>
                </div>
            </div>

            <!-- LAYER 2 (IBABAW): The Hideable Question Panel -->
            <div class="question-panel-overlay" id="question-overlay">
                
                <!-- Floating Tab na nakadikit sa gilid ng question panel -->
                <div class="floating-indicator-tab" onclick="toggleQuestionOverlay()">
                    <button class="toggle-arrow-btn" id="toggle-arrow-btn">▶</button>
                </div>

                <div class="question-content">
                    <div class="success-banner" id="success-banner">
                        <h4>Great Job!</h4>
                        <p>Task checked and verified automatically.</p>
                        <button class="btn-next" onclick="loadNextTask()">Next level</button>
                    </div>

                    <div class="task-card">
                        <div class="task-meta">Tasks with automatic check</div>
                        <div class="task-title" id="task-title">Loading assignment...</div>
                        <div class="task-description" id="task-desc">...</div>
                    </div>
                </div>

            </div>

        </div>

    </div>

    <!-- Link sa orihinal mong intact script.js compiler logic -->
    <script src="script.js"></script>
</body>
</html>
